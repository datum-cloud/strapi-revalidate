name: Release

# When commits land on main:
#  - If they introduce new .changeset/*.md files → opens or updates a
#    "Version Packages" PR that bumps package.json and updates CHANGELOG.md.
#  - If the latest commit consumed pending changesets (i.e. the Version
#    Packages PR was just merged) → runs `npm publish`.
#
# The same job handles both modes via `changesets/action@v1`.

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # commit version bumps and push the release tag
      pull-requests: write  # open / update the Version Packages PR
      id-token: write       # required for npm provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to compute the release notes diff.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          commit: 'chore: version packages'
          title: 'chore: version packages'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Enable npm provenance attestation only when publishing from CI.
          # Manual `npm publish` from a laptop still works without it.
          NPM_CONFIG_PROVENANCE: 'true'
